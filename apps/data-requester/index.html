<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Requester</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Data Requester</h1>
      <div id="auth-section"></div>
    </header>
    <main>
      <div id="content" class="hidden">
        <nav class="tabs">
          <button class="tab active" data-tab="chat-tab">Chat</button>
          <button class="tab" data-tab="grants-tab">Granted Access</button>
          <button class="tab" data-tab="request-tab">Request Access</button>
        </nav>

        <div id="chat-tab" class="tab-content active">
          <section id="chat-panel" class="hidden">
            <h2>Chat</h2>
            <div id="chat-container"></div>
          </section>
        </div>

        <div id="grants-tab" class="tab-content">
          <section id="grants-panel" class="hidden">
            <div id="grants-list"></div>
            <div id="resource-viewer" class="hidden"></div>
          </section>
        </div>

        <div id="request-tab" class="tab-content">
          <section id="search-panel">
            <h2>Users</h2>
            <div id="search-form"></div>
            <div id="search-results"></div>
          </section>
          <section id="resource-panel" class="hidden">
            <h2>Resources</h2>
            <div id="resource-browser"></div>
          </section>
          <section id="request-panel" class="hidden">
            <h2>Request Access</h2>
            <div id="request-form"></div>
          </section>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
